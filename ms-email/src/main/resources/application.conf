include "shared-data.conf"
include optional("shared-data.local.conf")
include "application-secrets.conf"
include "application-secrets.local.conf"

ktor {
    deployment { port = 8084 }
    application { modules = [es.daw.parallaxbot.email.ApplicationKt.module] }
}

parallaxbot {
    email {
        from = "ParallaxSports"
        oauth {
            redirect-uri = "http://localhost:8084/auth/callback"
        }
    }
}
