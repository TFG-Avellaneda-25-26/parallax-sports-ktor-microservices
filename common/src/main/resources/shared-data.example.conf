# shared-data.example.conf
#
# Reference template for shared-data.conf (prod) and shared-data.local.conf (dev).
#
# Committed base (shared-data.conf) holds prod Docker Compose service names.
# Gitignored override (shared-data.local.conf) holds localhost values for local dev.
# Priority: .local.conf wins if it exists; base is used as-is otherwise.
#
# Copy this file to shared-data.local.conf and fill in your local addresses.

include "shared-secrets.conf"
include "shared-secrets.local.conf"

parallaxbot {
    redis {
        stream = "alerts-stream"
    }

    api {
        base-url = "http://localhost:8080"   # prod: http://<spring-container>:8080
        endpoints {
            event            = ${parallaxbot.api.base-url}"/api/events"
            auth             = ${parallaxbot.api.base-url}"/oauth2/authorization"
            render           = ${parallaxbot.api.base-url}"/api/internal/render/event"
            artifact         = ${parallaxbot.api.base-url}"/api/internal/alerts"
            internal-discord = ${parallaxbot.api.base-url}"/api/internal/discord"
        }
    }

    playwright {
        base-url = "http://localhost:8087"   # prod: http://<playwright-container>:8087
    }

    cloudinary-service {
        base-url = "http://localhost:8085"   # prod: http://<cloudinary-container>:8085
    }
}
