// shared-data.conf — committed base, uses Docker Compose service hostnames.
// For local dev outside Docker, override these via shared-data.local.conf
// (gitignored). The .local file's values win over this base.

include "shared-secrets.conf"
include "shared-secrets.local.conf"

parallaxbot {
    redis {
        stream = "alerts-stream"
    }

    api {
        base-url = "http://spring-boot:8080"
        endpoints {
            event            = ${parallaxbot.api.base-url}"/api/events"
            auth             = ${parallaxbot.api.base-url}"/oauth2/authorization"
            render           = ${parallaxbot.api.base-url}"/api/internal/render/event"
            artifact         = ${parallaxbot.api.base-url}"/api/internal/alerts"
            internal-discord = ${parallaxbot.api.base-url}"/api/internal/discord"
        }
    }

    playwright {
        base-url = "http://ms-playwright:8087"
    }

    cloudinary-service {
        base-url = "http://ms-cloudinary:8085"
    }
}
