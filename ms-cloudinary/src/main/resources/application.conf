include "shared-data.conf"

ktor {
    deployment { port = 8085 }
    application { modules = [es.daw.parallaxbot.cloudinary.ApplicationKt.module ]}
}

parallaxbot {
    cloudinary {
        cloudName = ${CLOUDINARY_CLOUD_NAME}
        apiKey = ${CLOUDINARY_API_KEY}
        apiSecret = ${CLOUDINARY_API_SECRET}
    }
}
